<section
  class="relative h-screen flex flex-col items-center justify-center overflow-hidden"
  style="
    background-image: url('https://images.unsplash.com/photo-1559494007-9f5847c49d94?auto=format&fit=crop&w=2400&q=80');
    background-size: cover;
    background-position: center;
  "
>
  <!-- Subtle dark overlay -->
  <div class="absolute inset-0 bg-black/25"></div>

  <!-- Center stage: arrows + glass card -->
  <div class="relative z-10 flex items-center justify-center gap-8 lg:gap-14 w-full px-6">

    <!-- Left arrow -->
    <button
      (click)="prev()"
      class="flex-shrink-0 w-12 h-12 rounded-full border border-white/60 bg-white/10 backdrop-blur-sm flex items-center justify-center text-white hover:bg-white/25 transition-all duration-300"
    >
      <lucide-icon [img]="prevIcon" [size]="20"></lucide-icon>
    </button>

    <!-- Glass card with image inside -->
    <div
      class="relative w-[340px] sm:w-[400px] lg:w-[440px] aspect-[4/4.4] rounded-[28px] overflow-hidden flex-shrink-0"
      style="box-shadow: 0 30px 80px rgba(0,0,0,0.45)"
    >
      <!-- Slideshow image -->
      @for (slide of slides; track slide; let i = $index) {
        <img
          [src]="slide"
          alt="Resort view"
          class="absolute inset-0 w-full h-full object-cover transition-opacity duration-700"
          [class]="i === activeSlide() ? 'opacity-100' : 'opacity-0'"
        />
      }

      <!-- Glass border shimmer overlay -->
      <div
        class="absolute inset-0 rounded-[28px] border border-white/30 pointer-events-none"
        style="background: linear-gradient(160deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 60%)"
      ></div>

      <!-- Bottom gradient + headline text -->
      <div
        class="absolute bottom-0 left-0 right-0 px-6 pb-8 pt-20 flex flex-col items-center justify-end"
        style="background: linear-gradient(to top, rgba(30,90,80,0.72) 0%, rgba(30,90,80,0.25) 60%, transparent 100%)"
      >
        <h1
          class="font-serif text-4xl sm:text-5xl font-normal text-white text-center leading-tight"
          style="font-style: italic; text-shadow: 0 2px 16px rgba(0,0,0,0.3)"
        >
          Experience<br />New Perspective
        </h1>
      </div>
    </div>

    <!-- Right arrow -->
    <button
      (click)="next()"
      class="flex-shrink-0 w-12 h-12 rounded-full border border-white/60 bg-white/10 backdrop-blur-sm flex items-center justify-center text-white hover:bg-white/25 transition-all duration-300"
    >
      <lucide-icon [img]="nextIcon" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Bottom category nav bar -->
  <div class="absolute bottom-0 left-0 right-0 z-10">
    <div
      class="bg-black/50 backdrop-blur-md border-t border-white/10 flex items-stretch overflow-x-auto"
    >
      @for (cat of categories; track cat.label; let last = $last) {
        <!-- Category item -->
        <div
          class="flex-1 min-w-[150px] flex items-center justify-between px-6 py-4 gap-3 cursor-pointer group hover:bg-white/10 transition-colors"
        >
          <div class="flex flex-col items-center gap-2 flex-1">
            <lucide-icon
              [img]="cat.icon"
              [size]="20"
              class="text-[#c5a059] group-hover:scale-110 transition-transform"
            ></lucide-icon>
            <span class="text-white text-[9px] font-medium tracking-[0.2em] uppercase whitespace-nowrap">
              {{ cat.label }}
            </span>
          </div>
          <!-- Circle arrow button -->
          <div
            class="w-7 h-7 rounded-full border border-white/50 flex items-center justify-center text-white/70 group-hover:border-[#c5a059] group-hover:text-[#c5a059] transition-colors flex-shrink-0"
          >
            <lucide-icon [img]="arrowIcon" [size]="12"></lucide-icon>
          </div>
        </div>

        <!-- Divider (not after last) -->
        @if (!last) {
          <div class="w-px bg-white/20 self-stretch my-3"></div>
        }
      }
    </div>
  </div>
</section>
