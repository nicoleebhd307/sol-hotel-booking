<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ease-out"
	[class]="isScrolled() ? 'bg-[#fffbef] shadow-md py-4 md:py-6' : 'bg-transparent py-4 md:py-6'">
	<div class="mx-auto max-w-[1280px] px-8">
		<div class="flex items-center justify-between relative">

			<!-- Left: Nav Links -->
			<div class="hidden md:flex items-center gap-10">
				@for (link of navLinks(); track link.label) {
					<a [href]="link.href" class="text-sm uppercase tracking-[0.1em] transition-colors duration-300 hover:opacity-70"
						[class]="isScrolled() ? 'text-[#1a1a1a]' : 'text-white'">{{ link.label }}</a>
				}
			</div>

			<!-- Center: Logo (absolute) -->
			<div
				class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center gap-0.5 transition-all duration-300">
				<div class="h-7 flex items-center justify-center">
					<img
						[src]="isScrolled() ? 'assets/images/sol-gold.png' : logoUrl()"
						alt="Sol An Bang logo"
						class="h-7 w-auto object-contain transition-all duration-500"
					/>
				</div>
				<p class="text-xl uppercase font-serif tracking-[0.35em] leading-tight transition-colors duration-300"
					[class]="isScrolled() ? 'text-[#1a1a1a]' : 'text-white'">Sol An Bang</p>
				<p class="text-[10px] uppercase tracking-[0.25em] transition-colors duration-300"
					[class]="isScrolled() ? 'text-[#6b7280]' : 'text-white/70'">Beach Resort &amp; Spa</p>
			</div>

			<!-- Right: Contact + Reserve -->
			<div class="hidden md:flex items-center gap-6">
				<a href="#footer" class="text-sm uppercase tracking-[0.1em] transition-colors duration-300 hover:opacity-70"
					[class]="isScrolled() ? 'text-[#1a1a1a]' : 'text-white'">Contact Us</a>
				<a
					href="#"
					class="rounded-lg px-8 py-3 font-serif text-sm italic text-white shadow-md transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg"
					style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%)">
					{{ reserveLabel() }}
				</a>
			</div>

			<button
				type="button"
				class="md:hidden relative z-20 rounded-md p-2 transition-colors duration-300"
				[class]="isScrolled() ? 'text-[#1a1a1a] bg-black/5' : 'text-white bg-white/10'"
				(click)="toggleMenu()"
				aria-label="Toggle navigation"
			>
				<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M4 7H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
					<path d="M4 12H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
					<path d="M4 17H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
				</svg>
			</button>
		</div>
	</div>

	<div
		class="md:hidden mx-4 mt-4 rounded-xl border border-white/20 bg-black/55 p-4 backdrop-blur-md transition-all duration-300"
		[class]="isMenuOpen() ? 'opacity-100 translate-y-0 pointer-events-auto' : 'opacity-0 -translate-y-3 pointer-events-none'"
	>
		<div class="flex flex-col gap-2">
			@for (link of navLinks(); track link.label) {
				<a
					[href]="link.href"
					(click)="closeMenu()"
					class="rounded-lg px-3 py-2 text-sm uppercase tracking-[0.12em] text-white/90 transition-colors duration-300 hover:bg-white/10"
				>
					{{ link.label }}
				</a>
			}
			<a
				href="#"
				(click)="closeMenu()"
				class="mt-2 rounded-lg bg-gradient-to-b from-[#ddbc6c] to-[#c79e35] px-4 py-3 text-center text-sm uppercase tracking-[0.14em] text-white"
			>
				{{ reserveLabel() }}
			</a>
		</div>
	</div>
</nav>
