<div class="relative h-[600px] flex items-center justify-center overflow-hidden">
  <!-- Background Image -->
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');"></div>
  
  <!-- Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-blue-900/40 via-blue-900/30 to-blue-900/50"></div>

  <!-- Content -->
  <div class="relative z-10 text-center px-4">
    <!-- Reservation Badge -->
    <div class="inline-block px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full mb-6 border border-white/30">
      <span class="text-white text-xs uppercase tracking-widest font-semibold">✓ Reservation Confirmed</span>
    </div>

    <!-- Main Heading -->
    <h1 class="font-serif text-5xl md:text-6xl text-white mb-2 font-light">
      Your luxury retreat is 
      <span class="text-yellow-400">confirmed</span>!
    </h1>

    <!-- Booking ID -->
    <p class="text-white/80 text-lg md:text-xl">
      Booking ID: <span class="font-semibold">{{ bookingId }}</span>
    </p>
  </div>
</div>
