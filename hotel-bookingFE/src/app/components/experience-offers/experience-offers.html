<section class="bg-[#faf7f2] py-24 px-6 lg:px-10">
  <div class="max-w-7xl mx-auto">
    <!-- Section label -->
    <p class="text-[#9ca3af] text-[10px] tracking-[0.35em] uppercase font-normal mb-12 text-center">
      The Experience Offers
    </p>

    <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-20">
      <!-- Left: image preview -->
      <div class="w-full lg:w-64 flex-shrink-0">
        <div class="relative w-full lg:w-56 h-64 lg:h-80 rounded-xl overflow-hidden shadow-xl">
          <img
            [src]="experiences[activeIndex()].image"
            [alt]="experiences[activeIndex()].label"
            class="w-full h-full object-cover transition-all duration-500"
          />
          <!-- Overlay gradient -->
          <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
        </div>
      </div>

      <!-- Right: list items -->
      <div class="flex-1 w-full">
        @for (item of experiences; track item.label; let i = $index) {
          <div
            class="group cursor-pointer"
            (click)="activeIndex.set(i)"
            (mouseenter)="activeIndex.set(i)"
          >
            <div
              [class]="
                'py-5 flex items-center justify-between transition-colors duration-200 ' +
                (i === activeIndex() ? 'text-[#1a1a1a]' : 'text-[#9ca3af] hover:text-[#1a1a1a]')
              "
            >
              <span
                [class]="
                  'font-serif transition-all duration-300 ' +
                  (i === activeIndex()
                    ? 'text-4xl lg:text-5xl font-medium'
                    : 'text-3xl lg:text-4xl font-light')
                "
              >
                {{ item.label }}
              </span>
              @if (i === activeIndex()) {
                <div class="flex items-center gap-2 text-[#c5a059] text-sm font-medium">
                  <span class="text-xs tracking-widest uppercase hidden sm:block">Find View</span>
                  <lucide-icon [img]="arrowRightIcon" [size]="18"></lucide-icon>
                </div>
              }
            </div>
            @if (i < experiences.length - 1) {
              <div class="h-px bg-gray-200"></div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</section>
