<div class="space-y-6">
  <!-- Grid with Navigation Arrows -->
  <div class="relative">
    <!-- Left Arrow -->
    <button
      (click)="prevPage()"
      [disabled]="!hasPrevPage()"
      class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-12 z-10 p-2 rounded-full bg-[#d4a574] text-white hover:bg-[#c4944a] disabled:opacity-50 disabled:cursor-not-allowed transition-all"
      aria-label="Previous rooms"
    >
      <mat-icon class="!w-6 !h-6">chevron_left</mat-icon>
    </button>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (room of displayedRooms(); track room.id; let i = $index) {
        <div class="reveal-up" [style.--animation-delay]="i * 0.1 + 's'">
          <app-room-card [room]="room" />
        </div>
      }
    </div>

    <!-- Right Arrow -->
    <button
      (click)="nextPage()"
      [disabled]="!hasNextPage()"
      class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-12 z-10 p-2 rounded-full bg-[#d4a574] text-white hover:bg-[#c4944a] disabled:opacity-50 disabled:cursor-not-allowed transition-all"
      aria-label="Next rooms"
    >
      <mat-icon class="!w-6 !h-6">chevron_right</mat-icon>
    </button>
  </div>
</div>
