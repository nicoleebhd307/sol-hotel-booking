<section
  class="relative min-h-screen flex flex-col bg-cover bg-center bg-no-repeat"
  style="background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=1600&q=80') center / cover no-repeat;"
>
  <!-- Dark overlay -->
  <div class="pointer-events-none absolute inset-0 bg-black/10"></div>
  <!-- Top gradient for navbar readability -->
  <div class="pointer-events-none absolute inset-x-0 top-0 h-48 bg-gradient-to-b from-black/30 to-transparent"></div>

  <!-- Layout: fills viewport, title centered, bar at bottom -->
  <div class="relative z-10 flex flex-1 flex-col pt-20 pb-6 sm:pt-24 md:pt-28 md:pb-8">

    <!-- Flex-1 area: vertically centers the title in remaining space -->
    <div class="flex flex-1 items-center justify-center px-4 py-6 md:px-8">
      <div class="text-center text-white">
        <h1 class="font-serif text-8xl italic mb-6">{{ title }}</h1>
        <p class="text-sm leading-5 text-white opacity-90" style="letter-spacing: 3.6px; font-family: 'Inter', sans-serif; font-weight: 300;">{{ subtitle }}</p>
      </div>
    </div>

    <!-- Availability bar pinned to bottom of hero, centered -->
    <div class="w-full px-4 sm:px-6 md:px-8">
      <app-availability-bar />
    </div>

  </div>
</section>
