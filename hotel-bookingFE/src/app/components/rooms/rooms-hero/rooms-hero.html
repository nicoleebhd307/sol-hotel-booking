<section
  class="relative overflow-hidden px-4 min-h-screen flex flex-col items-center justify-center pb-20"
  style="background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=1600&q=80') center / cover no-repeat;"
>
  <div class="mx-auto max-w-7xl text-center text-white">
    <h1 class="font-serif text-8xl italic mb-6">{{ title }}</h1>
    <p class="text-sm leading-5 text-white opacity-90 mb-16" style="letter-spacing: 3.6px; font-family: 'Inter', sans-serif; font-weight: 300;">{{ subtitle }}</p>
  </div>

  @if (fields().length > 0) {
    <div class="mx-auto max-w-6xl w-full">
      <div class="rounded-lg bg-white/88 shadow-sm overflow-hidden" style="backdrop-filter: blur(5px);">
        <div class="grid gap-0 divide-slate-200" style="grid-template-columns: 1fr 1fr 1fr 1fr auto;">
          @for (field of fields(); track field.label; let i = $index) {
            @if (i < 4) {
              <div class="p-6 flex flex-col justify-center hover:bg-white/50 transition-colors cursor-pointer border-r border-slate-200">
                <p class="text-[10px] uppercase tracking-[0.12em] text-[#9ca3af] mb-2">{{ field.label }}</p>
                <div class="flex items-center justify-between gap-2">
                  <p class="text-sm font-medium text-[#1a1a1a]">{{ field.value }}</p>
                  @if (field.icon) {
                    <svg width="16" height="16" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-[#6B7280]">
                      <path d="M6.29999 8.3999L10.5 12.5999L14.7 8.3999" stroke="currentColor" stroke-width="1.575" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  }
                </div>
              </div>
            }
          }
          <button
            type="button"
            class="px-8 flex items-center justify-center text-xs uppercase tracking-[0.12em] font-semibold text-white transition-all hover:opacity-90"
            style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%);"
          >
            Search<br />Availability
          </button>
        </div>
      </div>
    </div>
  }
</section>
