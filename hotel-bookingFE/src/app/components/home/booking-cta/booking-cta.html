<section
	id="contact"
	class="relative flex min-h-[793px] items-center justify-center overflow-hidden px-4 py-32"
>
	<!-- Background photo -->
	<div class="absolute inset-0 bg-[#1a1a1a]">
		<img
			[src]="data().backgroundImageUrl"
			alt=""
			class="h-full w-full object-cover opacity-60"
		/>
	</div>

	<!-- Frosted glass card -->
	<div
		class="reveal-up relative w-full max-w-[600px] rounded-3xl border border-white/20 bg-white/15 px-12 pt-12 pb-16 flex flex-col gap-12"
		style="backdrop-filter: blur(6px); box-shadow: 0px 25px 50px -12px rgba(0,0,0,0.25);"
	>
		<!-- Heading: mixed regular + italic -->
		<h2 class="text-center text-5xl text-white" style="font-family: 'Playfair Display', serif; line-height: 1.15;">
			Experience the
			<em>perfect</em><br />
			<em>blend of luxury</em>
		</h2>

		<!-- Form fields -->
		<div class="flex flex-col gap-4">
			<input
				type="text"
				placeholder="Full name"
				class="w-full rounded-lg border border-white/30 bg-white/20 px-6 py-[18px] text-base font-light text-white placeholder-white/60 outline-none transition-all duration-300 focus:border-white/60 focus:bg-white/25"
				style="font-family: 'Plus Jakarta Sans', sans-serif;"
			/>
			<input
				type="email"
				placeholder="Email Address"
				class="w-full rounded-lg border border-white/30 bg-white/20 px-6 py-[18px] text-base font-light text-white placeholder-white/60 outline-none transition-all duration-300 focus:border-white/60 focus:bg-white/25"
				style="font-family: 'Plus Jakarta Sans', sans-serif;"
			/>
			<button
				class="w-full rounded-2xl py-5 text-white transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg active:scale-95"
				style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%); font-family: 'Playfair Display', serif; font-style: italic;"
			>
				Contact us
			</button>
			<p class="px-8 text-center text-[10px] leading-[1.625] text-white/70" style="font-family: 'Plus Jakarta Sans', sans-serif;">
				By clicking Contact Us, you agree to our Privacy Policy. Your personal information will be kept secure and used only to process your request and share occasional updates.
			</p>
		</div>
	</div>
</section>
