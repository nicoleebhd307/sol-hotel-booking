<section
	id="accommodations"
	class="relative overflow-hidden px-4 py-24"
>
	<!-- Background gradient overlay -->
	<div class="absolute inset-0" style="background: linear-gradient(0.46deg, rgba(255,255,255,0) 23.56%, rgba(255,251,239,1) 100%), linear-gradient(180deg, rgba(255,255,255,0) 21.15%, rgba(253,249,238,1) 100%);"></div>

	<div class="relative mx-auto max-w-7xl">
		<!-- Section heading -->
		<div class="mb-12 flex flex-col items-center">
			<h2 class="text-5xl leading-10 text-[#1a1a1a] italic" style="font-family: 'Playfair Display', serif;">Luxury Accommodations</h2>
		</div>

		<!-- Cards row: display all cards on single horizontal line -->
		<div class="flex flex-nowrap items-center justify-center gap-4">
			@for (card of cards(); track card.title; let i = $index) {
				<article
					class="group reveal-up bg-white/80 backdrop-blur-md flex flex-col gap-3 rounded-2xl p-3 w-[230px] h-[500px] transition-all duration-500 border border-white/40 shadow-md hover:shadow-2xl hover:-translate-y-3 flex-shrink-0"
					[style.--animation-delay]="(i * 0.1) + 's'"
				>
					<!-- Room image -->
					<div class="relative overflow-hidden rounded-[10px] h-64 shrink-0">
						<img
							[src]="card.imageUrl"
							[alt]="card.title"
							class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110"
						/>

						<!-- Overlay -->
						<div class="absolute inset-0 bg-gradient-to-t from-black/40 via-black/10 to-transparent opacity-80"></div>
					</div>

					<!-- Title -->
					<h3 class="text-[20px] leading-6 text-[#1a1a1a] line-clamp-2 transition-colors duration-300 group-hover:text-[#c5a059]" style="font-family: 'Playfair Display', serif;">{{ card.title }}</h3>

					<!-- Description -->
					<p class="text-xs leading-5 text-[#777] flex-grow line-clamp-2" style="font-family: 'Plus Jakarta Sans', sans-serif;">{{ card.description }}</p>

					<!-- Actions -->
				<div class="border-t border-[#e5e7eb] pt-2 px-2 mt-auto flex items-center justify-between">
					<button 
						(click)="navigateToDetail(card)"
						class="text-xs italic text-[#1a1a1a] transition-colors duration-300 hover:text-[#c5a059] cursor-pointer" 
						style="font-family: 'Playfair Display', serif;">
						{{ card.primaryAction }}
					</button>

					<button 
						(click)="navigateToStories()"
						class="text-xs italic text-[#c5a059] transition-all duration-300 hover:translate-x-2 hover:underline cursor-pointer" 
						style="font-family: 'Playfair Display', serif;">
						{{ card.secondaryAction }} →
					</button>
				</div>
				</article>
			}
		</div>
	</div>
</section>
