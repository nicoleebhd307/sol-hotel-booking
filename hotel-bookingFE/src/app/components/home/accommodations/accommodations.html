<section
	id="accommodations"
	class="relative overflow-hidden px-4 py-24"
>
	<!-- Background gradient overlay -->
	<div class="absolute inset-0" style="background: linear-gradient(0.46deg, rgba(255,255,255,0) 23.56%, rgba(255,251,239,1) 100%), linear-gradient(180deg, rgba(255,255,255,0) 21.15%, rgba(253,249,238,1) 100%);"></div>

	<div class="relative mx-auto max-w-7xl">
		<!-- Section heading -->
		<div class="mb-12 flex flex-col items-center reveal-up">
			<h2 class="text-5xl leading-10 text-[#1a1a1a] italic" style="font-family: 'Playfair Display', serif;">Luxury Accommodations</h2>
		</div>

		<!-- Cards row: non-featured cards height 460px, featured is scale-105 with gold glow -->
		<div class="flex items-center justify-center gap-6">
			@for (card of cards(); track card.title; let i = $index) {
				<article
					class="reveal-up bg-white flex flex-col gap-4 rounded-2xl p-5 w-[395px] transition-all duration-500"
					[ngClass]="card.featured
						? 'z-10 scale-105'
						: 'shadow-sm hover:shadow-lg hover:-translate-y-1'"
					[style.min-height]="card.featured ? '' : '460px'"
					[style.box-shadow]="card.featured ? '4px 4px 50px 0px rgba(255,237,203,1)' : ''"
					[style.--animation-delay]="(i * 0.1) + 's'"
				>
					<!-- Room image -->
					<div class="relative overflow-hidden rounded-[10px] h-64 shrink-0">
						<img
							[src]="card.imageUrl"
							[alt]="card.title"
							class="h-full w-full object-cover transition-transform duration-700 hover:scale-110"
						/>
					</div>

					<!-- Title -->
					<h3 class="text-2xl leading-8 text-[#1a1a1a]" style="font-family: 'Playfair Display', serif;">{{ card.title }}</h3>

					<!-- Description -->
					<p class="text-sm leading-6 text-[#000000]" style="font-family: 'Plus Jakarta Sans', sans-serif;">{{ card.description }}</p>

					<!-- Actions -->
					@if (card.featured) {
						<div class="px-4 flex gap-5 mt-auto">
							<button
								class="flex-1 rounded-lg border border-[#1a1a1a] py-3 text-sm italic text-[#1a1a1a] transition-all duration-300 hover:bg-[#1a1a1a] hover:text-white"
								style="font-family: 'Playfair Display', serif;"
							>
								{{ card.primaryAction }}
							</button>
							<button
								class="flex-1 rounded-lg py-3 text-sm italic text-white transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg active:scale-95"
								style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%); font-family: 'Playfair Display', serif;"
							>
								{{ card.secondaryAction }}
							</button>
						</div>
					} @else {
						<div class="border-t border-[#e5e7eb] pt-4 px-4 mt-auto flex items-center justify-between">
							<button class="text-sm italic text-[#1a1a1a] transition-colors duration-300 hover:text-[#c5a059]" style="font-family: 'Playfair Display', serif;">
								{{ card.primaryAction }}
							</button>
							<button class="text-sm italic text-[#c5a059] transition-transform duration-300 hover:translate-x-1" style="font-family: 'Playfair Display', serif;">
								{{ card.secondaryAction }} →
							</button>
						</div>
					}
				</article>
			}
		</div>
	</div>
</section>
