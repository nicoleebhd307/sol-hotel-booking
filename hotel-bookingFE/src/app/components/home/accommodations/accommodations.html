<section
	id="accommodations"
	class="relative overflow-hidden px-4 py-24"
>
	<!-- Background gradient overlay -->
	<div class="absolute inset-0" style="background: linear-gradient(0.46deg, rgba(255,255,255,0) 23.56%, rgba(255,251,239,1) 100%), linear-gradient(180deg, rgba(255,255,255,0) 21.15%, rgba(253,249,238,1) 100%);"></div>

	<div class="relative mx-auto max-w-7xl">
		<!-- Section heading -->
		<div class="mb-12 flex flex-col items-center">
			<h2 class="text-5xl leading-10 text-[#1a1a1a] italic" style="font-family: 'Playfair Display', serif;">Luxury Accommodations</h2>
		</div>

		<!-- Cards row: display all cards on single horizontal line -->
		<div class="flex flex-nowrap items-center justify-center gap-4">
			@for (card of cards(); track card.title; let i = $index) {
				<article
					class="group reveal-up bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-2xl transition-all duration-300 w-[280px] flex-shrink-0 flex flex-col"
					[style.--animation-delay]="(i * 0.1) + 's'"
				>
					<!-- Room image -->
					<div class="relative overflow-hidden h-48 shrink-0">
						<img
							[src]="card.imageUrl"
							[alt]="card.title"
							class="h-full w-full object-cover hover:scale-105 transition-transform duration-500"
						/>
					</div>

					<!-- Content -->
					<div class="p-4 flex flex-col gap-3 flex-grow">
						<!-- Title -->
						<h3 class="font-serif text-lg text-[#1a1a1a]">{{ card.title }}</h3>

						<!-- Description -->
						<p class="text-sm text-[#374151] line-clamp-3 flex-grow">{{ card.description }}</p>

						<!-- Actions -->
						<div class="flex gap-2 pt-2 mt-auto">
							<button
								(click)="navigateToDetail(card)"
								class="flex-1 rounded-lg border border-[#1a1a1a] py-1.5 px-2 font-serif italic text-[#1a1a1a] text-sm transition-all duration-300 hover:bg-[#1a1a1a] hover:text-white"
							>
								View Details
							</button>
							<button
								(click)="bookNow(card)"
								class="flex-1 rounded-lg py-1.5 px-2 font-serif italic text-white text-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg active:scale-95"
								style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%);"
							>
								Book Now
							</button>
						</div>
					</div>
				</article>
			}
		</div>
	</div>
</section>
