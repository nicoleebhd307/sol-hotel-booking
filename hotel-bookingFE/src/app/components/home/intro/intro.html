<section
	id="intro"
	class="relative overflow-hidden py-32 reveal-up"
	style="background: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=1600&q=80') center / cover no-repeat;"
>
	<!-- Warm overlay -->
	<div class="absolute inset-0" style="background: rgba(255,251,239,0.82);"></div>

	<div class="relative mx-auto flex max-w-4xl flex-col items-center text-center px-4">
		<img
			[src]="data().logoUrl"
			alt="Resort logo"
			class="h-16 w-28 rounded object-cover"
		/>

		<div class="mt-8 space-y-0">
			<h2 class="font-sans text-5xl leading-[72px] text-[#1a1a1a]">
				Sol An Bang Beach Resort &amp; Spa
			</h2>
			<p class="font-serif text-5xl leading-[72px] text-[#1a1a1a] italic">
				– A Beachfront Hideaway Amidst Pristine Casuarina Forests
			</p>
		</div>

		<button
			class="mt-12 rounded-lg px-8 py-3 font-serif text-lg italic text-white transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg"
			style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%);"
		>
			Discover More
		</button>
	</div>
</section>
