<section class="border-y border-[#f3f4f6] bg-[#fffcf1] py-24 px-4">
	<div class="mx-auto grid max-w-7xl gap-16 lg:grid-cols-2 items-center px-12">

		<!-- Left: Image -->
		<div class="reveal-left">
			<img
				[src]="data().imageUrl"
				alt="Experience preview"
				class="w-full max-w-[474px] rounded-lg object-cover transition-transform duration-500 hover:scale-[1.02]"
				style="aspect-ratio: 1; box-shadow: 0px 25px 50px -12px rgba(0,0,0,0.25);"
			/>
		</div>

		<!-- Right: Content -->
		<div class="reveal-right">
			<!-- Subtitle -->
			<p class="text-sm uppercase tracking-[0.25em] text-[#c5a059]">{{ data().title }}</p>

			<!-- Offer items -->
			<div class="mt-7 space-y-5">
				@for (item of data().items; track item.title; let i = $index) {
					<div
						class="flex items-center justify-between border-b border-[#f3f4f6] pb-4 transition-all duration-300 cursor-pointer group"
						[style]="'animation-delay:' + (i * 0.08) + 's'"
					>
						<h3
							class="font-serif transition-all duration-300"
							[class]="item.active
								? 'text-5xl italic font-semibold text-[#1a1a1a]'
								: 'text-4xl text-[#1a1a1a] group-hover:text-[#c5a059]'"
						>
							{{ item.title }}
						</h3>

						@if (item.active) {
							<button class="font-serif italic text-sm text-[#1a1a1a] whitespace-nowrap transition-transform duration-300 hover:translate-x-1">
								View More →
							</button>
						}
					</div>
				}
			</div>
		</div>
	</div>
</section>
