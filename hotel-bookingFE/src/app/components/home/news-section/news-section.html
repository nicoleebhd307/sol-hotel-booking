<section class="bg-[#fffcf1] px-8 py-32">
	<div class="mx-auto max-w-7xl relative">
		<!-- Outer row: image cards + offset text panel -->
		<div class="flex items-center gap-12">

			<!-- Left: Image cards (2 stacked side by side, second faded) -->
			<div class="flex gap-8 w-[65%] shrink-0">
				@for (item of data().items; track item.title; let i = $index) {
					<article
						class="reveal-up group relative overflow-hidden rounded-2xl flex-1 transition-all duration-500 cursor-pointer"
						[style.opacity]="i > 0 ? 0.16 : 1"
						[style.--animation-delay]="(i * 0.15) + 's'"
					>
						<img
							[src]="item.imageUrl"
							[alt]="item.title"
							class="h-[500px] w-full object-cover transition-transform duration-700 group-hover:scale-105"
						/>
						<!-- Gradient overlay text -->
						<div
							class="absolute inset-0 flex flex-col justify-end p-12"
							style="background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);"
						>
							<p
								class="text-sm uppercase text-white transition-transform duration-300 group-hover:-translate-y-1"
								style="font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 3.6px;"
							>{{ item.date }}</p>
							<h3
								class="mt-2 text-3xl leading-9 text-white transition-transform duration-300 group-hover:-translate-y-1"
								style="font-family: 'Playfair Display', serif;"
							>{{ item.title }}</h3>
						</div>
					</article>
				}
			</div>

			<!-- Right: Text content -->
			<div class="reveal-right flex flex-col gap-6 flex-1">
				<h2 class="text-5xl leading-[56px] text-[#1a1a1a]" style="font-family: 'Playfair Display', serif;">
					What's New<br />
					<em>at Our Resort</em>
				</h2>
				<p class="text-base leading-7 text-[#6b7280]" style="font-family: 'Plus Jakarta Sans', sans-serif;">
					{{ data().description }}
				</p>
				<button
					class="self-start rounded-2xl px-10 py-4 text-white transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg active:scale-95"
					style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%); font-family: 'Playfair Display', serif; font-style: italic;"
				>
					Explore All
				</button>
			</div>
		</div>
	</div>
</section>
