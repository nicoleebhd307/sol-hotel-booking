<section class="bg-[#fffcf1] px-8 py-24">
	<div class="mx-auto max-w-7xl">
		<div class="relative flex items-center">
			<!-- Left: Image cards -->
			<div class="flex gap-8 w-[60%]">
				@for (item of data().items; track item.title; let i = $index) {
					<article
						class="reveal-up group relative overflow-hidden rounded-2xl flex-1 transition-all duration-500"
						[class]="i > 0 ? 'opacity-[0.16]' : ''"
						[style]="'animation-delay:' + (i * 0.15) + 's'"
					>
						<img
							[src]="item.imageUrl"
							[alt]="item.title"
							class="h-[500px] w-full object-cover transition-transform duration-700 group-hover:scale-110"
						/>
						<!-- Overlay text -->
						<div
							class="absolute inset-0 flex flex-col justify-end p-12 text-white"
							style="background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);"
						>
							<p class="text-sm uppercase tracking-[0.25em] transition-transform duration-300 group-hover:-translate-y-1">{{ item.date }}</p>
							<h3 class="mt-3 font-serif text-3xl leading-tight transition-transform duration-300 group-hover:-translate-y-1">{{ item.title }}</h3>
						</div>
					</article>
				}
			</div>

			<!-- Right: Text content — absolute center-right -->
			<div class="absolute right-0 w-[35%] reveal-right">
				<h2 class="font-serif text-5xl leading-[56px] text-[#1a1a1a]">
					What's New<br />
					<span class="italic">at Our Resort</span>
				</h2>
				<p class="mt-6 text-base leading-7 text-[#6b7280]">{{ data().description }}</p>
				<button
					class="mt-8 rounded-2xl px-10 py-4 font-serif italic text-white transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg"
					style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%);"
				>
					Explore All
				</button>
			</div>
		</div>
	</div>
</section>
