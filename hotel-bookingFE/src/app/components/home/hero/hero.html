<section
	id="hero"
	class="relative flex min-h-screen flex-col bg-cover bg-center bg-no-repeat"
	[style.background-image]="'url(' + data().backgroundImageUrl + ')'"
>
	<!-- Dark overlay -->
	<div class="pointer-events-none absolute inset-0 bg-black/10"></div>
	<!-- Top gradient for navbar readability -->
	<div class="pointer-events-none absolute inset-x-0 top-0 h-48 bg-gradient-to-b from-black/30 to-transparent"></div>

	<!-- Layout: fills viewport, card centered, bar at bottom -->
	<div class="relative z-10 flex flex-1 flex-col pt-20 pb-6 sm:pt-24 md:pt-28 md:pb-8">

		<!-- Flex-1 area: vertically centers the card in remaining space -->
		<div class="flex flex-1 items-center justify-center px-4 py-6 md:px-8">

			<!-- Glassmorphism welcome card -->
			<div
				class="hero-card-enter relative flex w-full max-w-xl flex-col items-center gap-4 rounded-xl border border-white/30 bg-white/15 px-8 py-12 text-center sm:max-w-2xl sm:px-12 sm:py-14 md:px-20 md:py-20"
				style="backdrop-filter: blur(6px); box-shadow: 0px 25px 50px -12px rgba(0, 0, 0, 0.25);"
			>
				<p
					class="font-['Plus_Jakarta_Sans',sans-serif] text-[10px] uppercase text-white/90 sm:text-xs"
					style="letter-spacing: 6px"
				>{{ data().welcomeEyebrow }}</p>
				<h1 class="hero-heading font-['Playfair_Display',serif] italic text-white">
					{{ data().headingLineOne }}<br />{{ data().headingLineTwo }}
				</h1>
			</div>

		</div>

		<!-- Availability bar pinned to bottom of hero, centered -->
		<div class="w-full px-4 sm:px-6 md:px-8">
			<app-availability-bar [fields]="availabilityFields()" />
		</div>

	</div>
</section>
