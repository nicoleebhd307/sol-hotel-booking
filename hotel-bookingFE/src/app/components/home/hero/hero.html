<section
	id="hero"
	class="relative flex flex-col items-center overflow-hidden min-h-screen w-full"
	[style.background-image]="'linear-gradient(rgba(0,0,0,0.1),rgba(0,0,0,0.1)), url(' + data().backgroundImageUrl + ')'"
	style="background-size: cover; background-position: center; background-repeat: no-repeat;"
>
	<!-- Spacer to push card to vertical center within hero -->
	<div class="flex flex-1 w-full flex-col items-center justify-center pt-28 pb-32">
		<!-- Glassmorphism welcome card -->
		<div
			class="relative w-full max-w-2xl rounded-xl border border-white/30 bg-white/15 px-20 py-20 pb-26 text-center shadow-2xl"
			style="backdrop-filter: blur(6px); box-shadow: 0px 25px 50px -12px rgba(0,0,0,0.25);"
		>
			<p class="text-xs uppercase tracking-[0.5em] text-black/70">Welcome to</p>
			<h1 class="mt-2 font-serif text-6xl md:text-7xl italic leading-[1.05] text-white">
				Experience<br />New Perspective
			</h1>
		</div>
	</div>
</section>
