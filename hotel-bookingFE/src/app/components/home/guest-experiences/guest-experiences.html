<section class="bg-[#fffcf1] px-4 py-24">
	<div class="mx-auto max-w-7xl px-8">

		<!-- Section Heading -->
		<div class="mb-12 text-center reveal-up">
			<h2 class="font-serif text-5xl italic text-[#1a1a1a]">Guest Experiences</h2>
		</div>

		<!-- Rating + Cards row -->
		<div class="flex items-center justify-between gap-8">

			<!-- Left: Rating summary -->
			<div class="flex flex-col items-center text-center w-[300px] shrink-0 reveal-left">
				<h3 class="font-serif text-4xl text-[#0f172a]">{{ data().scoreText }}</h3>

				<!-- Stars -->
				<div class="mt-3 flex items-center justify-center gap-0.5">
					@for (_ of [1,2,3,4]; track $index) {
						<svg width="20" height="19" viewBox="0 0 20 19" fill="none"><path d="M3.825 19L5.45 11.975L0 7.25L7.2 6.625L10 0L12.8 6.625L20 7.25L14.55 11.975L16.175 19L10 15.275L3.825 19Z" fill="#F9BF00"/></svg>
					}
					<svg width="20" height="19" viewBox="0 0 20 19" fill="none">
						<defs>
							<linearGradient id="half-star" x1="0" y1="0" x2="20" y2="0">
								<stop offset="50%" stop-color="#F9BF00"/>
								<stop offset="50%" stop-color="#CBD5E1"/>
							</linearGradient>
						</defs>
						<path d="M3.825 19L5.45 11.975L0 7.25L7.2 6.625L10 0L12.8 6.625L20 7.25L14.55 11.975L16.175 19L10 15.275L3.825 19Z" fill="url(#half-star)"/>
					</svg>
				</div>

				<p class="mt-3 text-sm text-[#475569]">{{ data().reviewCountText }}</p>

				<!-- Google logo placeholder -->
				<div class="mt-3 flex items-center gap-1">
					<svg width="102" height="34" viewBox="0 0 102 34" fill="none" xmlns="http://www.w3.org/2000/svg">
						<text x="0" y="24" font-family="sans-serif" font-size="12" fill="#9ca3af" letter-spacing="1">Google</text>
					</svg>
				</div>
			</div>

			<!-- Right: Testimonial cards (2-col) -->
			<div class="relative flex-1">
				<div class="grid gap-8 md:grid-cols-2">
					@for (card of data().cards; track card.author; let i = $index) {
						<article
							class="reveal-up flex flex-col justify-between rounded-2xl border border-[rgba(197,160,89,0.10)] bg-white/80 p-10 transition-all duration-300 hover:border-[rgba(197,160,89,0.4)] hover:shadow-xl"
							[class]="i === 1 ? 'scale-105 shadow-xl' : ''"
							[style]="i === 1 ? 'box-shadow: 0px 25px 50px -12px rgba(0,0,0,0.25);' + 'animation-delay:0.1s' : 'animation-delay:0s'"
							style="backdrop-filter: blur(4px);"
						>
							<!-- Stars -->
							<div>
								<div class="flex gap-0">
									@for (_ of [1,2,3,4,5]; track $index) {
										<svg width="20" height="19" viewBox="0 0 20 19" fill="none">
											<path d="M6.85 14.825L10 12.925L13.15 14.85L12.325 11.25L15.1 8.85L11.45 8.525L10 5.125L8.55 8.5L4.9 8.825L7.675 11.25L6.85 14.825ZM3.825 19L5.45 11.975L0 7.25L7.2 6.625L10 0L12.8 6.625L20 7.25L14.55 11.975L16.175 19L10 15.275L3.825 19Z" fill="#C5A059"/>
										</svg>
									}
								</div>
								<p class="mt-6 text-base leading-[26px] text-[#374151]">"{{ card.quote }}"</p>
							</div>

							<!-- Author -->
							<div class="mt-8 flex items-center gap-2">
								<div>
									<p class="text-sm uppercase tracking-[0.25em] text-[#1a1a1a]">{{ card.author }}</p>
									<div class="mt-1 flex items-center gap-1">
										<span class="text-[11px] uppercase tracking-[0.1em] text-[#9ca3af]">{{ card.source }}</span>
										<!-- Google icon -->
										<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
											<path d="M11.28 6.125C11.28 5.735 11.245 5.36 11.18 5H6V7.13H8.96C8.83 7.815 8.44 8.395 7.855 8.785V10.17H9.64C10.68 9.21 11.28 7.8 11.28 6.125Z" fill="#4285F4"/>
											<path d="M6 11.5C7.485 11.5 8.73 11.01 9.64 10.17L7.855 8.785C7.365 9.115 6.74 9.315 6 9.315C4.57 9.315 3.355 8.35 2.92 7.05H1.09V8.47C1.995 10.265 3.85 11.5 6 11.5Z" fill="#34A853"/>
											<path d="M2.92 7.045C2.81 6.715 2.745 6.365 2.745 6C2.745 5.635 2.81 5.285 2.92 4.955V3.535H1.09C0.715 4.275 0.5 5.11 0.5 6C0.5 6.89 0.715 7.725 1.09 8.465L2.92 7.045Z" fill="#FBBC05"/>
											<path d="M6 2.69C6.81 2.69 7.53 2.97 8.105 3.51L9.68 1.935C8.725 1.045 7.485 0.5 6 0.5C3.85 0.5 1.995 1.735 1.09 3.535L2.92 4.955C3.355 3.655 4.57 2.69 6 2.69Z" fill="#EA4335"/>
										</svg>
									</div>
								</div>
							</div>
						</article>
					}
				</div>

				<!-- Nav arrows -->
				<button class="absolute -left-12 top-1/2 -translate-y-1/2 flex items-center justify-center transition-colors duration-300 hover:text-[#c5a059]">
					<svg width="8" height="12" viewBox="0 0 8 12" fill="none"><path d="M6 12L0 6L6 0L7.4 1.4L2.8 6L7.4 10.6L6 12Z" fill="#CBD5E1"/></svg>
				</button>
				<button class="absolute -right-12 top-1/2 -translate-y-1/2 flex items-center justify-center transition-colors duration-300 hover:text-[#c5a059]">
					<svg width="8" height="12" viewBox="0 0 8 12" fill="none"><path d="M4.6 6L0 1.4L1.4 0L7.4 6L1.4 12L0 10.6L4.6 6Z" fill="#CBD5E1"/></svg>
				</button>
			</div>
		</div>

		<!-- Google reviews CTA -->
		<div class="mt-12 flex justify-center reveal-up">
			<button
				class="rounded-2xl px-10 py-4 font-serif italic text-white transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg"
				style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%);"
			>
				View Reviews on Google
			</button>
		</div>
	</div>
</section>
