<div class="absolute-booking-bar">
	<div class="booking-bar-wrapper">
		<div
			class="rounded-lg bg-white/88 overflow-hidden"
			style="backdrop-filter: blur(4px); box-shadow: 0px 8px 10px -6px rgba(0,0,0,0.1), 0px 20px 25px -5px rgba(0,0,0,0.1);"
		>
			<div class="grid" style="grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(140px, 1fr); grid-template-rows: 87px;">
				@for (field of fields(); track field.label; let i = $index) {
					<div
						class="flex flex-col justify-center cursor-pointer transition-colors duration-300 hover:bg-slate-50/60 px-6 border-[#e5e7eb]"
						[class.border-l]="i > 0"
											>
						<p class="text-[10px] uppercase text-[#9ca3af] leading-[15px]" style="letter-spacing: 1px;">{{ field.label }}</p>
						<div class="mt-1 flex items-center justify-between">
							<p class="text-sm font-medium text-[#1a1a1a] leading-5">{{ field.value }}</p>
							@if (field.icon) {
								<svg width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
									<path d="M6.29999 8.3999L10.5 12.5999L14.7 8.3999" stroke="#6B7280" stroke-width="1.575" stroke-linecap="round" stroke-linejoin="round"/>
								</svg>
							}
						</div>
					</div>
				}
				<button
					type="button"
					class="rounded-tr-lg rounded-br-lg border-l border-[#e5e7eb] flex items-center justify-center text-sm uppercase tracking-[0.1em] text-white transition-all duration-300 hover:opacity-90 hover:shadow-lg"
					style="background: linear-gradient(0deg, rgba(199,158,53,1) 0%, rgba(221,188,108,1) 100%);"
				>
					Search Availability
				</button>
			</div>
		</div>
	</div>
</div>
