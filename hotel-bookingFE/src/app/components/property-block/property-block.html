<section class="relative h-[600px] lg:h-[700px] overflow-hidden">
  <!-- Background image with transition -->
  @for (block of blocks; track block.id; let i = $index) {
    <div
      class="absolute inset-0 transition-opacity duration-700"
      [class]="i === activeIndex() ? 'opacity-100' : 'opacity-0'"
      [style.backgroundImage]="'url(' + block.image + ')'"
      style="background-size: cover; background-position: center"
    >
      <div class="absolute inset-0 bg-black/40"></div>
    </div>
  }

  <!-- Content layer -->
  <div class="relative z-10 h-full flex items-center justify-end px-6 lg:px-20">
    <!-- Floating info card -->
    <div class="bg-white rounded-2xl shadow-2xl p-7 w-72 flex-shrink-0">
      <!-- Unit label -->
      <div class="flex items-center justify-between mb-5">
        <div>
          <p class="text-[#9ca3af] text-[9px] tracking-[0.3em] uppercase font-normal">
            Unit Number
          </p>
          <p class="font-serif text-xl font-normal text-[#1a1a1a] mt-0.5">
            {{ current.blockNumber }}
          </p>
        </div>
        <div
          class="bg-[#c5a059] text-white text-xs font-medium px-3 py-1.5 rounded-full"
        >
          Available
        </div>
      </div>

      <!-- Stats -->
      <div class="flex flex-col gap-3 border-t border-b border-gray-100 py-4 mb-4">
        <div class="flex items-center gap-3 text-gray-600">
          <lucide-icon [img]="layersIcon" [size]="15" class="text-[#c5a059] flex-shrink-0"></lucide-icon>
          <span class="text-sm">{{ current.floors }} Floors</span>
        </div>
        <div class="flex items-center gap-3 text-gray-600">
          <lucide-icon [img]="bedIcon" [size]="15" class="text-[#c5a059] flex-shrink-0"></lucide-icon>
          <span class="text-sm">{{ current.suites }} Suites</span>
        </div>
        <div class="flex items-center gap-3 text-gray-600">
          <lucide-icon [img]="wavesIcon" [size]="15" class="text-[#c5a059] flex-shrink-0"></lucide-icon>
          <span class="text-sm">{{ current.pools }} Swimming Pool</span>
        </div>
      </div>

      <!-- Price & button -->
      <div class="flex items-center justify-between">
        <div>
          <p class="text-[#9ca3af] text-[9px] tracking-[0.15em] uppercase">From</p>
          <p class="font-serif text-2xl font-semibold text-[#1a1a1a]">{{ current.price }}</p>
        </div>
        <button class="btn btn-dark btn-sm">Book Now</button>
      </div>
    </div>
  </div>

  <!-- Navigation arrows (left-center) -->
  <div class="absolute left-6 lg:left-10 bottom-1/2 translate-y-1/2 z-10 flex flex-col gap-3">
    <button
      (click)="prev()"
      class="w-11 h-11 bg-white/20 backdrop-blur-sm border border-white/30 rounded-full flex items-center justify-center text-white hover:bg-white/40 transition-colors"
    >
      <lucide-icon [img]="prevIcon" [size]="18"></lucide-icon>
    </button>
    <button
      (click)="next()"
      class="w-11 h-11 bg-white/20 backdrop-blur-sm border border-white/30 rounded-full flex items-center justify-center text-white hover:bg-white/40 transition-colors"
    >
      <lucide-icon [img]="nextIcon" [size]="18"></lucide-icon>
    </button>
  </div>

  <!-- Dots indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 flex gap-2">
    @for (block of blocks; track block.id; let i = $index) {
      <button
        (click)="activeIndex.set(i)"
        [class]="
          'transition-all duration-300 rounded-full ' +
          (i === activeIndex() ? 'w-8 h-2 bg-[#c5a059]' : 'w-2 h-2 bg-white/60 hover:bg-white/90')
        "
      ></button>
    }
  </div>
</section>
