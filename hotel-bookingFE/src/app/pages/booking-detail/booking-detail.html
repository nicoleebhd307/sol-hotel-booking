<div class="bg-[#f9f7f2] text-[#1d1c13] min-h-screen flex flex-col font-sans">
  <!-- Sticky Navbar -->
  <app-sticky-navbar [navLinks]="navLinks" [logoUrl]="logoUrl" [reserveLabel]="reserveLabel" />

  <!-- Loading State -->
  @if (isLoading()) {
  <div class="flex-1 flex items-center justify-center py-32">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-[#c5a059] border-t-transparent rounded-full animate-spin mx-auto mb-6">
      </div>
      <p class="text-[#4e4639] text-lg font-sans">Loading booking details...</p>
    </div>
  </div>
  }

  <!-- Error State -->
  @else if (errorMessage()) {
  <div class="flex-1 flex items-center justify-center py-32">
    <div class="text-center max-w-md px-4">
      <div class="text-6xl mb-6">🔍</div>
      <p class="text-[#4e4639] text-lg mb-8 font-sans">{{ errorMessage() }}</p>
      <button (click)="backToSearch()"
        class="px-8 py-3 font-sans font-semibold text-sm uppercase tracking-widest text-white rounded-xl transition-all hover:opacity-90"
        style="background: linear-gradient(98.44deg, #775a19 0%, #c5a059 100%);">
        ← Search Again
      </button>
    </div>
  </div>
  }

  <!-- Booking Detail Content -->
  @else if (booking()) {

  <app-booking-confirmation-hero [bookingId]="booking()!._id" />

  <!-- ─── Main Content Grid (overlaps hero) ──────────────── -->
  <div class="relative z-10 -mt-24 md:-mt-28 px-4 md:px-6 pb-10 mx-auto max-w-[1200px] w-full">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Left column: 2/3 -->
      <div class="lg:col-span-2 flex flex-col gap-8">
        <app-booking-details-card
          [booking]="booking()!"
          [statusClass]="statusClass"
          [guestsLabel]="guestsLabel"
          [inclusions]="inclusions" />
        <app-booking-inclusions />
      </div>

      <!-- Right column: 1/3 -->
      <div class="flex flex-col gap-8">
        <app-manage-booking-panel
          [booking]="booking()!"
          [payment]="payment()"
          [nights]="nights"
          [nightsTotal]="nightsTotal"
          (downloadPDF)="onDownloadPDF()"
          (cancelBooking)="onCancelBooking()" />
      </div><!-- end right -->
    </div><!-- end grid -->
  </div>

  }<!-- end @else if booking() -->

  <!-- Footer -->
  <app-site-footer [data]="footerData" />
</div>
