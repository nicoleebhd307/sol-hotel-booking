<div class="bg-[#f9f7f2] text-[#1a1a1a] h-auto flex flex-col min-h-screen">
  <!-- Sticky Navbar -->
  <app-sticky-navbar
    [navLinks]="navLinks"
    [logoUrl]="logoUrl"
    [reserveLabel]="reserveLabel"
  />

  <!-- Hero Confirmation Section -->
  <app-booking-confirmation-hero />

  <!-- Main Content: 2-Column Layout -->
  <div class="px-4 py-12 mx-auto max-w-6xl w-full">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Left Column (70%) -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Booking Details Card -->
        <app-booking-details-card />
        
        <!-- Two Smaller Cards Below -->
        <app-booking-inclusions />
      </div>

      <!-- Right Column (30%) -->
      <div class="space-y-6">
        <!-- Manage Booking Panel -->
        <app-manage-booking-panel />
      </div>
    </div>
  </div>

  <!-- Need Assistance Section -->
  <div class="px-4 py-12 bg-stone-100">
    <div class="mx-auto max-w-6xl">
      <div class="flex items-center gap-4">
        <div class="text-4xl flex-shrink-0">😊</div>
        <div>
          <h3 class="font-semibold text-slate-800 text-sm uppercase tracking-widest mb-1">Need Assistance?</h3>
          <p class="text-slate-600 text-sm">Your Concierge is available 24/7</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <app-site-footer [data]="footerData" />
</div>
